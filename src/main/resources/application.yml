spring:
  config:
    import: optional:file:.env[.properties]
  # PostgreSQL 연결 설정
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/school_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      connection-init-sql: "SET session_replication_role = 'replica'"  # 개발 시 한정 (FK 체크 우회)

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create # 개발 시 한정
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50 # 엑셀 입력시 50개씩 묶어서 넣기
        order_inserts: true

  # Redis 연결 설정
  data:
    redis:
      host: localhost
      port: 6380

# JWT 커스텀 설정
jwt:
  secret: ${JWT_SECRET}
  access_expiration_time: ${JWT_ACCESS_EXPIRATION}
  refresh_expiration_time: ${JWT_REFRESH_EXPIRATION}

logging:
  level:
    org.springframework.security: DEBUG
