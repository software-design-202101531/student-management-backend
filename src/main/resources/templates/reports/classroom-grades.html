<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4 landscape; margin: 1.5cm; }
        body { font-family: 'Nanum Gothic', sans-serif; color: #1e293b; font-size: 11px; }
        h1 { font-size: 18px; margin: 0 0 4px 0; }
        p.meta { color: #64748b; margin: 0 0 10px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #cbd5e1; padding: 4px 6px; text-align: center; }
        th { background: #f1f5f9; }
        td.name { text-align: left; }
    </style>
</head>
<body>
<h1>학급 전체 성적</h1>
<p class="meta"><span th:text="${label}">-</span> · <span th:text="${examName}">시험</span></p>

<table>
    <thead>
    <tr>
        <th>번호</th>
        <th>이름</th>
        <th th:each="subj : ${subjectNames}" th:text="${subj}">과목</th>
        <th>총점</th>
        <th>평균</th>
        <th>등급</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${rows}">
        <td th:text="${row.studentNum}">-</td>
        <td class="name" th:text="${row.studentName}">-</td>
        <td th:each="sc : ${row.scores}" th:text="${sc}">-</td>
        <td th:text="${row.totalScore}">-</td>
        <td th:text="${row.averageScore}">-</td>
        <td th:text="${row.gradeLevel}">-</td>
    </tr>
    </tbody>
</table>
</body>
</html>
