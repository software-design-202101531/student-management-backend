<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4; margin: 2cm; }
        body { font-family: 'Nanum Gothic', sans-serif; color: #1e293b; font-size: 12px; }
        h1 { font-size: 20px; margin: 0 0 4px 0; }
        p.meta { color: #64748b; margin: 0 0 10px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #cbd5e1; padding: 6px 8px; text-align: left; vertical-align: top; }
        th { background: #f1f5f9; }
    </style>
</head>
<body>
<h1>상담 내역</h1>
<p class="meta">학생 #<span th:text="${studentId}">0</span> · 총 <span th:text="${#lists.size(items)}">0</span>건</p>

<table>
    <thead>
    <tr><th>상담일시</th><th>작성교사</th><th>공개범위</th><th>내용</th><th>다음 계획</th></tr>
    </thead>
    <tbody>
    <tr th:each="c : ${items}">
        <td th:text="${c.consultationDate}">-</td>
        <td th:text="${c.teacherName}">-</td>
        <td th:text="${c.visibilityLabel}">-</td>
        <td th:text="${c.content}">-</td>
        <td th:text="${c.nextPlan}">-</td>
    </tr>
    </tbody>
</table>
</body>
</html>
