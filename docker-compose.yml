services:
  postgres:
    image: postgres:16
    container_name: school_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: school_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: school_redis
    ports:
      - "6380:6379"
    volumes:
      - ./redis/data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: school_rabbitmq
    ports:
      - "5672:5672"    # AMQP 프로토콜 포트
      - "15672:15672"  # 관리 콘솔
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: school_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API 포트
      - "9001:9001"    # 웹 콘솔
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio/data:/data

  # DB 정기 백업 사이드카: 매일 BACKUP_HOUR(기본 04)시 pg_dump → MinIO(school-backups) 업로드 + 보존정리.
  # 복구: docker compose exec db-backup db-restore.sh [파일명]   (자세한 절차는 docs/backup-recovery.md)
  db-backup:
    build: ./scripts/backup
    image: school-db-backup:latest
    container_name: school_db_backup
    depends_on:
      - postgres
      - minio
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: school_db
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-school-backups}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_HOUR: ${BACKUP_HOUR:-4}
    restart: unless-stopped
