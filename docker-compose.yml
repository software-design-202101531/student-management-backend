services:
  postgres:
    image: postgres:16
    container_name: school_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: school_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: school_redis
    ports:
      - "6380:6379"
    volumes:
      - ./redis/data:/data
