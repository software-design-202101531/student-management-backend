name: Build & Push DB-Backup image (Docker Hub)

# 백업 사이드카 이미지는 자주 바뀌지 않으므로 scripts/backup 변경 시에만 빌드한다.
# 앱 배포(deploy.yml)와 분리해 매 배포마다 불필요하게 재빌드하지 않는다.
on:
  push:
    branches: [ "main" ]
    paths: [ "scripts/backup/**" ]
  workflow_dispatch:

env:
  IMAGE_NAME: student-management-db-backup

jobs:
  build-and-push:
    name: Build image & push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./scripts/backup
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
