name: Build & Deploy (Docker Hub + SSH)

# main 브랜치 push 시 자동 배포 + 수동 실행 지원
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: student-management-backend

jobs:
  build-and-push:
    name: Build image & push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (선택) JDK 21 셋업 후 테스트 — Testcontainers 사용 시 러너의 Docker로 동작
      # 테스트를 배포 게이트로 쓰려면 아래 두 step의 주석을 해제하세요.
      # - name: Set up JDK 21
      #   uses: actions/setup-java@v4
      #   with:
      #     distribution: temurin
      #     java-version: "21"
      # - name: Run tests
      #   run: ./gradlew test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH deploy on server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu          # EC2 기본 사용자(Ubuntu AMI 기준). Amazon Linux 면 ec2-user 로 변경
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail

            IMAGE="${{ needs.build-and-push.outputs.image }}:latest"
            CONTAINER="student-management-app"
            NETWORK="student-management-net"
            ENV_FILE="/student-management/spring/app.env"

            echo "==> Docker Hub 로그인"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "==> 최신 이미지 pull: ${IMAGE}"
            docker pull "${IMAGE}"

            echo "==> 네트워크 보장: ${NETWORK}"
            docker network inspect "${NETWORK}" >/dev/null 2>&1 || docker network create "${NETWORK}"

            echo "==> 기존 컨테이너 정리"
            docker rm -f "${CONTAINER}" 2>/dev/null || true

            echo "==> 새 컨테이너 기동"
            docker run -d \
              --name "${CONTAINER}" \
              --network "${NETWORK}" \
              --env-file "${ENV_FILE}" \
              -e SPRING_PROFILES_ACTIVE=prod \
              -p 8080:8080 \
              --restart unless-stopped \
              "${IMAGE}"

            echo "==> 미사용 이미지 정리"
            docker image prune -f

            echo "==> 배포 완료"
            docker ps --filter "name=${CONTAINER}"
